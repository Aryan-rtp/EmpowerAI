services:
  - type: web
    name: employee-ai
    env: node
    plan: free
    buildCommand: "npm ci && npm --prefix client ci && npm --prefix client run build && mkdir -p public && cp -r client/dist/* public/"
    startCommand: "npm start"
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: SERVE_CLIENT
        value: "true"
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
